openapi: 3.0.3
info:
  title: Users Service API
  description: Auth, profiles, and addresses for the e-commerce marketplace
  version: 1.0.0
servers:
  - url: http://localhost:8081
    description: Local (direct)
  - url: http://localhost:8000/v1/users
    description: Via Kong
paths:
  /health:
    get:
      summary: Health check
      operationId: health
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  service:
                    type: string
                    example: users
                  version:
                    type: string
                    example: "1.0.0"
  /register:
    post:
      summary: Register a new user
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - name
                - phone
                - cpf
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                password:
                  type: string
                  minLength: 6
                  example: secret123
                name:
                  type: string
                  example: John Doe
                phone:
                  type: string
                  example: "11999999999"
                cpf:
                  type: string
                  description: Brazilian CPF (11 digits); formatting (dots/dashes) is optional
                  example: "52998224725"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  email:
                    type: string
                  name:
                    type: string
        "400":
          description: Validation error (e.g. invalid email, short password, invalid CPF)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: invalid cpf
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: email already registered
  /login:
    post:
      summary: Login and get JWT
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                password:
                  type: string
                  example: secret123
      responses:
        "200":
          description: Login successful; returns access token
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: JWT access token
                  expire_at:
                    type: string
                    format: date-time
                    description: Token expiration time
        "400":
          description: Validation error (e.g. invalid email format, password required)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: email is required
        "401":
          description: Invalid credentials (wrong email or password)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: invalid credentials
        "500":
          description: Server error (e.g. JWT_SECRET not set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: failed to login user
