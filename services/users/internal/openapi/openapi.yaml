openapi: 3.0.3
info:
  title: Users Service API
  description: Auth, profiles, and addresses for the e-commerce marketplace
  version: 1.0.0
servers:
  - url: http://localhost:8081
    description: Local (direct)
  - url: http://localhost:8000/v1/users
    description: Via Kong
paths:
  /health:
    get:
      summary: Health check
      operationId: health
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  service:
                    type: string
                    example: users
                  version:
                    type: string
                    example: "1.0.0"
  /register:
    post:
      summary: Register a new user
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - name
                - phone
                - cpf
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                password:
                  type: string
                  minLength: 6
                  example: secret123
                name:
                  type: string
                  example: John Doe
                phone:
                  type: string
                  example: "11999999999"
                cpf:
                  type: string
                  description: Brazilian CPF (11 digits); formatting (dots/dashes) is optional
                  example: "52998224725"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  email:
                    type: string
                  name:
                    type: string
        "400":
          description: Validation error (e.g. invalid email, short password, invalid CPF)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: invalid cpf
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: email already registered
  /login:
    post:
      summary: Login and get JWT
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                password:
                  type: string
                  example: secret123
      responses:
        "200":
          description: Login successful; returns access token
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: JWT access token
                  expire_at:
                    type: string
                    format: date-time
                    description: Token expiration time
        "400":
          description: Validation error (e.g. invalid email format, password required)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: email is required
        "401":
          description: Invalid credentials (wrong email or password)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: invalid credentials
        "500":
          description: Server error (e.g. JWT_SECRET not set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: failed to login user
  /password-reset/request:
    post:
      summary: Request password reset
      description: |
        Sends a password reset token for the given email. If the email exists, returns the token (for dev/testing).
        In production the token would be sent by email only. Always returns 200 to avoid leaking whether the email exists.
      operationId: requestPasswordReset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: Request accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  reset_token:
                    type: string
                    description: Present when email exists (dev); use in confirm
                  expires_at:
                    type: string
                    format: date-time
        "400":
          description: Invalid email
  /password-reset/confirm:
    post:
      summary: Confirm password reset
      description: Set new password using the token from request (or email link). Token is single-use and expires (e.g. 1h).
      operationId: confirmPasswordReset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, new_password]
              properties:
                token:
                  type: string
                  description: Token from request response or reset link
                new_password:
                  type: string
                  minLength: 6
      responses:
        "204":
          description: Password updated
        "400":
          description: Invalid or expired token, or validation error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
  /me:
    get:
      summary: Get current user profile
      description: |
        Returns the profile of the authenticated user. Requires a valid JWT:
        the client sends `Authorization: Bearer <token>`. Kong validates the JWT
        and forwards the user ID in the `X-User-ID` header; the service does not
        validate the token.
      operationId: getMe
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                    description: User ID
                  email:
                    type: string
                    format: email
                  name:
                    type: string
                  phone:
                    type: string
                    example: "11999999999"
                  cpf:
                    type: string
                    description: Brazilian CPF (11 digits)
                    example: "52998224725"
        "401":
          description: Missing or invalid identity (Kong must set X-User-ID after JWT validation)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: missing user identity (gateway must set X-User-ID after JWT validation)
        "404":
          description: User not found (e.g. ID from token no longer exists)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: user not found
        "500":
          description: Server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: failed to get user
    patch:
      summary: Update current user profile
      description: |
        Updates name, phone, and/or CPF for the authenticated user. Requires a valid JWT.
        Send only the fields you want to change; at least one field is required.
      operationId: updateMe
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              minProperties: 1
              properties:
                name:
                  type: string
                  example: John Doe
                phone:
                  type: string
                  example: "11999999999"
                cpf:
                  type: string
                  description: Brazilian CPF (11 digits); formatting optional
                  example: "52998224725"
      responses:
        "200":
          description: Profile updated; returns current profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  email:
                    type: string
                    format: email
                  name:
                    type: string
                  phone:
                    type: string
                  cpf:
                    type: string
        "400":
          description: Validation error (e.g. no fields sent, invalid CPF)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: at least one field (name, phone, cpf) is required
        "401":
          description: Missing or invalid identity
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        "404":
          description: User not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: user not found
        "500":
          description: Server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: failed to get user

  /me/addresses:
    get:
      summary: List current user addresses
      description: Returns all addresses for the authenticated user. Requires JWT.
      operationId: listAddresses
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of addresses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Address"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          description: Server error
    post:
      summary: Create address
      description: Creates a new address for the authenticated user. Type must be billing or shipping. Requires JWT.
      operationId: createAddress
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddressInput"
      responses:
        "201":
          description: Address created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Address"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          description: Server error

  /me/addresses/{id}:
    get:
      summary: Get address by ID
      operationId: getAddress
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Address
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Address"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Address not found
        "500":
          description: Server error
    patch:
      summary: Update address
      operationId: updateAddress
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddressInput"
      responses:
        "200":
          description: Address updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Address"
        "400":
          description: Validation error
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Address not found
        "500":
          description: Server error
    delete:
      summary: Delete address
      operationId: deleteAddress
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Address deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Address not found
        "500":
          description: Server error

components:
  responses:
    Unauthorized:
      description: Missing or invalid identity (JWT)
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
  schemas:
    Address:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        street:
          type: string
        number:
          type: string
        complement:
          type: string
        neighborhood:
          type: string
        city:
          type: string
        state:
          type: string
        zip_code:
          type: string
          description: Brazilian CEP (12345-678 or 12345678)
        type:
          type: string
          enum: [billing, shipping]
        is_default_billing:
          type: boolean
        is_default_shipping:
          type: boolean
    AddressInput:
      type: object
      required:
        - street
        - number
        - neighborhood
        - city
        - state
        - zip_code
        - type
      properties:
        street:
          type: string
        number:
          type: string
        complement:
          type: string
        neighborhood:
          type: string
        city:
          type: string
        state:
          type: string
        zip_code:
          type: string
        type:
          type: string
          enum: [billing, shipping]
        is_default_billing:
          type: boolean
          default: false
        is_default_shipping:
          type: boolean
          default: false
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token from POST /login. Kong validates it and sets X-User-ID for the service.
