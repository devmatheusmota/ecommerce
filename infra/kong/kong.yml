# Kong Gateway — declarative config (static fallback)
# kong-seed uses kong.yml.template + JWT_SECRET from services/users/.env (see docker-compose).
# This file is the fallback when importing manually (e.g. kong config db_import kong.yml); for seed, the template is used.
# JWT: Consumer "users" secret must match users service JWT_SECRET (e.g. dev for local).
#
# Path routing (no request-transformer needed for normal routes):
# The catch-all route /v1/users uses strip_path: true, so Kong strips the prefix and forwards the suffix:
#   GET /v1/users/login    → upstream /login
#   POST /v1/users/register → upstream /register
#   GET /v1/users/health   → upstream /health
# This is the standard Kong pattern ("rename endpoint via Route + strip_path").
#
# Exception: /v1/users/me has its own route for JWT protection. Because the full path is stripped
# (exact match → nothing left), a request-transformer sets the upstream URI to /me.

_format_version: "3.0"

consumers:
  - username: users
    jwt_secrets:
      - key: users
        algorithm: HS256
        secret: "dev"

services:
  - name: health
    url: https://httpbin.org/status/200
    routes:
      - name: health-route
        paths:
          - /health
        strip_path: true

  - name: users
    url: http://users:8080
    routes:
      # More specific paths MUST come before /v1/users/me (prefix match would catch /me/addresses).
      - name: users-me-addresses-route
        paths:
          - /v1/users/me/addresses
        strip_path: true
        methods:
          - GET
          - POST
          - PATCH
          - DELETE
      - name: users-me-route
        paths:
          - /v1/users/me
        strip_path: true
        methods:
          - GET
          - PATCH
      # users-login-route and users-register-route are explicit so plugins (e.g. rate limit) can be
      # attached to each individually via the Kong UI without affecting other paths.
      - name: users-login-route
        paths:
          - /v1/users/login
        strip_path: true
        methods:
          - POST
      - name: users-register-route
        paths:
          - /v1/users/register
        strip_path: true
        methods:
          - POST
      # Catch-all: strip_path removes /v1/users prefix, forwarding the suffix to the upstream.
      # GET /v1/users/health → /health, GET /v1/users/docs → /docs, etc.
      - name: users-route
        paths:
          - /v1/users
        strip_path: true
        methods:
          - GET
          - POST

plugins:
  - name: request-transformer
    route: users-me-route
    config:
      replace:
        uri: "/me"

  - name: request-transformer
    route: users-login-route
    config:
      replace:
        uri: "/login"

  - name: request-transformer
    route: users-register-route
    config:
      replace:
        uri: "/register"
  - name: jwt
    route: users-me-route
    config:
      key_claim_name: iss
      claims_to_verify:
        - exp

  - name: jwt
    route: users-me-addresses-route
    config:
      key_claim_name: iss
      claims_to_verify:
        - exp
  - name: pre-function
    route: users-me-addresses-route
    config:
      access:
        - |
          local prefix = "/v1/users/me/addresses"
          local client = kong.request.get_path() or ""
          local suffix = (#client > #prefix) and string.sub(client, #prefix + 1) or ""
          kong.service.request.set_path("/me/addresses" .. suffix)
          local auth = kong.request.get_header("authorization")
          if auth and auth ~= "" then
            local token = auth:gsub("^[Bb]earer%s+", "")
            local parts = {}
            for p in (token .. "."):gmatch("(.-)%.") do parts[#parts + 1] = p end
            if #parts >= 2 then
              local payload = parts[2]:gsub("-", "+"):gsub("_", "/")
              local pad = (#payload % 4)
              if pad > 0 then payload = payload .. string.rep("=", 4 - pad) end
              local decoded = ngx.decode_base64(payload)
              if decoded then
                local sub = decoded:match('"sub"%s*:%s*"([^"]+)"')
                if sub then kong.service.request.set_header("X-User-ID", sub) end
              end
            end
          end

  - name: pre-function
    route: users-me-route
    config:
      access:
        - |
          local auth = kong.request.get_header("authorization")
          if auth and auth ~= "" then
            local token = auth:gsub("^[Bb]earer%s+", "")
            local parts = {}
            for p in (token .. "."):gmatch("(.-)%.") do
              parts[#parts + 1] = p
            end
            if #parts >= 2 then
              local payload = parts[2]:gsub("-", "+"):gsub("_", "/")
              local pad = (#payload % 4)
              if pad > 0 then
                payload = payload .. string.rep("=", 4 - pad)
              end
              local decoded = ngx.decode_base64(payload)
              if decoded then
                local sub = decoded:match('"sub"%s*:%s*"([^"]+)"')
                if sub then
                  kong.service.request.set_header("X-User-ID", sub)
                end
              end
            end
          end
